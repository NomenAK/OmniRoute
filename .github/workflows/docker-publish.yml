name: Publish source image

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. 2.6.0). Defaults to package version + short SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and push source image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/omniroute"
          short_sha="${GITHUB_SHA::12}"
          package_version="$(node -p "require('./package.json').version")"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"
          elif [ -n "${VERSION_INPUT}" ]; then
            version="${VERSION_INPUT}"
            version="${version#v}"
          else
            version="${package_version}-${short_sha}"
          fi

          tags=(
            "${image}:${version}"
            "${image}:sha-${short_sha}"
          )

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tags+=("${image}:main" "${image}:latest")
          fi

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Publishing ${image}:${version}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
        env:
          DOCKER_BUILDKIT_INLINE_CACHE: 1

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
